{{ define "main" }}
  {{ .Content }}
  {{ range site.RegularPages | first 3 }}
    <h2><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h2>
    {{ $summary := index (split .Content "</p>") 0 }}
    {{ $summary | plainify }}
    <b class='tags'>
    {{ range $i, $e := .Params.tags -}}
        {{- if $i -}}, {{ end -}}
        <a href='{{ "/tags/" | relLangURL }}{{ . | urlize }}'>{{ $e | humanize }}</a>
    {{- end -}}
    </b>
  {{ end }}
{{ end }}
