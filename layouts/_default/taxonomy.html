{{ define "main" }}
    <h1>{{ .Title }}</h1>
    {{ $prev_char := "" }}
    {{ range (sort .Pages "Title") }}
        {{ $current_char := substr .Title 0 1 }}
        {{ if ne $prev_char $current_char }} 
            <h2>{{ $current_char }}</h2>
            {{ $prev_char = $current_char }}
        {{ end }}
        <div class='taxonomy'>
            <h3><a href="{{ .RelPermalink}}">{{ .Title }}</a></h3>
        </div>
    {{ end }}
{{ end }}
